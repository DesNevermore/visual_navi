<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blind Navigation Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            background: #000;
            color: #fff;
        }

        #camera-preview {
            width: 100%;
            height: 40vh;
            object-fit: cover;
            background: #222;
        }

        #debug-log {
            height: 10vh;
            background: #1a1a1a;
            padding: 10px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #debug-log div {
            line-height: 1.4;
        }

        #button-container {
            height: 50vh;
            display: flex;
        }

        .action-button {
            flex: 1;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s;
        }

        #capture-button {
            background: #0066cc;
            color: white;
        }

        #capture-button:active {
            background: #0052a3;
        }

        #speak-button {
            background: #00aa00;
            color: white;
        }

        #speak-button:active {
            background: #008800;
        }

        #speak-button.recording {
            background: #cc0000;
        }

        #speak-button.recording:active {
            background: #aa0000;
        }

        .button-label {
            font-size: 24px;
        }

        .button-hint {
            font-size: 14px;
            opacity: 0.8;
        }

        .button-disabled {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <video id="camera-preview" autoplay playsinline aria-hidden="true"></video>

    <div id="debug-log" aria-hidden="true">
        <div id="log-line-1">Capture: 0</div>
        <div id="log-line-2">Last upload: none</div>
        <div id="log-line-3">State: boot</div>
    </div>

    <div id="button-container">
        <button id="capture-button" class="action-button" aria-label="Capture photo button. Tap once to capture image and sensors.">
            <span class="button-label">CAPTURE PHOTO</span>
            <span class="button-hint">Tap to capture</span>
        </button>
        <button id="speak-button" class="action-button" aria-label="Speak button. Tap once to start recording, tap again to stop and send.">
            <span class="button-label">SPEAK</span>
            <span class="button-hint">Tap to record</span>
        </button>
    </div>

    <script>
        // State
        let state = 'boot';
        let captureCount = 0;
        let isRecording = false;
        let recordingStream = null;
        let audioContext = null;
        let recordingSource = null;
        let recordingProcessor = null;
        let recordingSilence = null;
        let recordingBuffers = [];
        let recordingSampleRate = 44100;
        let videoStream = null;

        // Sensor data
        let latestSensors = {
            orientation: null,
            motion: null,
            screen: null
        };

        // DOM elements
        const video = document.getElementById('camera-preview');
        const captureButton = document.getElementById('capture-button');
        const speakButton = document.getElementById('speak-button');
        const logLine1 = document.getElementById('log-line-1');
        const logLine2 = document.getElementById('log-line-2');
        const logLine3 = document.getElementById('log-line-3');

        // Backend URL for local development and oc.rustapp.uk tunnels.
        const FETCH_TIMEOUT_MS = 45000;
        const BROWSER_TTS_VOLUME = 0.55;
        const BUTTON_TONE_VOLUME = 0.12;
        const BACKEND_PORT_BY_FRONTEND_PORT = {
            '1200': '1100',
            '1201': '1101'
        };
        const backendPort = BACKEND_PORT_BY_FRONTEND_PORT[window.location.port] ||
            (['localhost', '127.0.0.1'].includes(window.location.hostname) ? '1100' : '1101');
        const BACKEND_URL = `${window.location.protocol}//${window.location.hostname}:${backendPort}`;

        // Update debug log
        function updateLog(line, text) {
            if (line === 1) logLine1.textContent = text;
            else if (line === 2) logLine2.textContent = text;
            else if (line === 3) logLine3.textContent = text;
        }

        function playClickTone() {
            const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextCtor) return;

            const context = new AudioContextCtor();
            const oscillator = context.createOscillator();
            const gain = context.createGain();
            const now = context.currentTime;

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, now);
            gain.gain.setValueAtTime(0.001, now);
            gain.gain.linearRampToValueAtTime(BUTTON_TONE_VOLUME, now + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);

            oscillator.connect(gain);
            gain.connect(context.destination);
            oscillator.start(now);
            oscillator.stop(now + 0.09);
            oscillator.onended = () => context.close();
        }

        function resetToReady() {
            state = 'ready';
            isRecording = false;
            updateLog(3, 'State: ready');
            captureButton.classList.remove('button-disabled');
            speakButton.classList.remove('button-disabled', 'recording');
            speakButton.querySelector('.button-label').textContent = 'SPEAK';
            speakButton.querySelector('.button-hint').textContent = 'Tap to record';
        }

        async function fetchWithTimeout(url, options) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);

            try {
                return await fetch(url, {
                    ...options,
                    signal: controller.signal
                });
            } finally {
                clearTimeout(timeoutId);
            }
        }

        // Speak text using browser TTS
        function speak(text, audioBase64 = null, audioContentType = 'audio/mpeg') {
            if (audioBase64) {
                const audio = new Audio(`data:${audioContentType || 'audio/mpeg'};base64,${audioBase64}`);
                speechSynthesis.cancel();
                audio.play().catch((err) => {
                    console.error('Audio playback error:', err);
                    speak(text);
                });
                return;
            }

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 1.0;
            utterance.volume = BROWSER_TTS_VOLUME;
            speechSynthesis.cancel(); // Cancel any ongoing speech
            speechSynthesis.speak(utterance);
        }

        async function startAudioRecording() {
            recordingStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            recordingSampleRate = audioContext.sampleRate;
            recordingBuffers = [];

            recordingSource = audioContext.createMediaStreamSource(recordingStream);
            recordingProcessor = audioContext.createScriptProcessor(4096, 1, 1);
            recordingSilence = audioContext.createGain();
            recordingSilence.gain.value = 0;

            recordingProcessor.onaudioprocess = (event) => {
                recordingBuffers.push(new Float32Array(event.inputBuffer.getChannelData(0)));
            };

            recordingSource.connect(recordingProcessor);
            recordingProcessor.connect(recordingSilence);
            recordingSilence.connect(audioContext.destination);
        }

        async function stopAudioRecording() {
            if (recordingProcessor) {
                recordingProcessor.disconnect();
                recordingProcessor.onaudioprocess = null;
            }
            if (recordingSource) recordingSource.disconnect();
            if (recordingSilence) recordingSilence.disconnect();
            if (recordingStream) {
                recordingStream.getTracks().forEach(track => track.stop());
            }
            if (audioContext) {
                await audioContext.close();
            }

            recordingProcessor = null;
            recordingSource = null;
            recordingSilence = null;
            recordingStream = null;
            audioContext = null;

            const wavBuffer = encodeWav(recordingBuffers, recordingSampleRate);
            recordingBuffers = [];
            return new Blob([wavBuffer], { type: 'audio/wav' });
        }

        function encodeWav(buffers, sampleRate) {
            const sampleCount = buffers.reduce((total, buffer) => total + buffer.length, 0);
            const wavBuffer = new ArrayBuffer(44 + sampleCount * 2);
            const view = new DataView(wavBuffer);

            writeAscii(view, 0, 'RIFF');
            view.setUint32(4, 36 + sampleCount * 2, true);
            writeAscii(view, 8, 'WAVE');
            writeAscii(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeAscii(view, 36, 'data');
            view.setUint32(40, sampleCount * 2, true);

            let offset = 44;
            for (const buffer of buffers) {
                for (let i = 0; i < buffer.length; i++) {
                    const sample = Math.max(-1, Math.min(1, buffer[i]));
                    view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7fff, true);
                    offset += 2;
                }
            }

            return wavBuffer;
        }

        function writeAscii(view, offset, text) {
            for (let i = 0; i < text.length; i++) {
                view.setUint8(offset + i, text.charCodeAt(i));
            }
        }

        // Initialize camera
        async function initCamera() {
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' },
                    audio: false
                });
                video.srcObject = videoStream;
                updateLog(2, 'Camera: initialized');
                return true;
            } catch (err) {
                console.error('Camera error:', err);
                updateLog(2, 'Camera: failed');
                speak('Camera access denied');
                return false;
            }
        }

        // Initialize microphone (test only, actual recording happens on button press)
        async function initMicrophone() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(track => track.stop()); // Just testing permission
                updateLog(2, 'Microphone: initialized');
                return true;
            } catch (err) {
                console.error('Microphone error:', err);
                updateLog(2, 'Microphone: failed');
                speak('Microphone access denied');
                return false;
            }
        }

        // Request device orientation permission (iOS 13+)
        async function initOrientation() {
            if (typeof DeviceOrientationEvent !== 'undefined' &&
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        setupOrientationListeners();
                        return true;
                    } else {
                        updateLog(2, 'Orientation: denied');
                        return false;
                    }
                } catch (err) {
                    console.error('Orientation permission error:', err);
                    return false;
                }
            } else {
                // Android or older iOS - no permission needed
                setupOrientationListeners();
                return true;
            }
        }

        // Setup sensor listeners
        function setupOrientationListeners() {
            window.addEventListener('deviceorientation', (event) => {
                latestSensors.orientation = {
                    alpha: event.alpha,
                    beta: event.beta,
                    gamma: event.gamma,
                    absolute: event.absolute
                };
            });

            window.addEventListener('devicemotion', (event) => {
                latestSensors.motion = {
                    acceleration: event.acceleration ? {
                        x: event.acceleration.x,
                        y: event.acceleration.y,
                        z: event.acceleration.z
                    } : null,
                    accelerationIncludingGravity: event.accelerationIncludingGravity ? {
                        x: event.accelerationIncludingGravity.x,
                        y: event.accelerationIncludingGravity.y,
                        z: event.accelerationIncludingGravity.z
                    } : null,
                    rotationRate: event.rotationRate ? {
                        alpha: event.rotationRate.alpha,
                        beta: event.rotationRate.beta,
                        gamma: event.rotationRate.gamma
                    } : null,
                    interval: event.interval
                };
            });

            if (screen.orientation) {
                latestSensors.screen = {
                    type: screen.orientation.type,
                    angle: screen.orientation.angle
                };
                screen.orientation.addEventListener('change', () => {
                    latestSensors.screen = {
                        type: screen.orientation.type,
                        angle: screen.orientation.angle
                    };
                });
            }
        }

        // Capture image from video
        function captureImage() {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);

            return new Promise((resolve) => {
                canvas.toBlob((blob) => {
                    resolve(blob);
                }, 'image/jpeg', 0.85);
            });
        }

        // Upload capture to backend
        async function uploadCapture(imageBlob) {
            const formData = new FormData();
            formData.append('image', imageBlob, 'capture.jpg');
            formData.append('sensors', JSON.stringify(latestSensors));

            try {
                const response = await fetchWithTimeout(`${BACKEND_URL}/capture`, {
                    method: 'POST',
                    credentials: 'include',
                    body: formData
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                return data;
            } catch (err) {
                console.error('Upload error:', err);
                return { status: 'error', spoken_text: 'Upload failed' };
            }
        }

        // Upload command to backend
        async function uploadCommand(audioBlob) {
            const formData = new FormData();
            formData.append('audio', audioBlob, 'command.wav');
            formData.append('sensors', JSON.stringify(latestSensors));

            try {
                const response = await fetchWithTimeout(`${BACKEND_URL}/command`, {
                    method: 'POST',
                    credentials: 'include',
                    body: formData
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                return data;
            } catch (err) {
                console.error('Command upload error:', err);
                return { status: 'error', spoken_text: 'Command upload failed' };
            }
        }

        // Handle capture button
        captureButton.addEventListener('click', async () => {
            playClickTone();

            if (state === 'boot') {
                // First time - initialize everything
                updateLog(3, 'State: initializing');
                captureButton.classList.add('button-disabled');
                speakButton.classList.add('button-disabled');

                const cameraOk = await initCamera();
                const micOk = await initMicrophone();
                const orientationOk = await initOrientation();

                if (!cameraOk) {
                    speak('Cannot start without camera access');
                    return;
                }

                // Wait for video to be ready
                await new Promise(resolve => {
                    if (video.readyState >= 2) resolve();
                    else video.addEventListener('loadeddata', resolve, { once: true });
                });

                state = 'ready';
                updateLog(3, 'State: ready');
                captureButton.classList.remove('button-disabled');
                speakButton.classList.remove('button-disabled');
                speak('Ready. Tap capture to take a photo, or tap speak to record your destination.');
                return;
            }

            if (state !== 'ready') return;

            // Capture and upload
            state = 'busy';
            updateLog(3, 'State: capturing');
            captureButton.classList.add('button-disabled');
            speakButton.classList.add('button-disabled');

            const imageBlob = await captureImage();
            captureCount++;
            updateLog(1, `Capture: ${captureCount}`);
            updateLog(2, 'Uploading image + sensors');

            const result = await uploadCapture(imageBlob);

            updateLog(2, `Last upload: image + sensors`);
            resetToReady();

            if (result.spoken_text) {
                speak(result.spoken_text, result.audio_base64, result.audio_content_type);
            }
        });

        // Handle speak button
        speakButton.addEventListener('click', async () => {
            playClickTone();

            if (state === 'boot') {
                speak('Please tap capture first to initialize');
                return;
            }

            if (state === 'busy') return;

            if (!isRecording) {
                // Start recording
                try {
                    await startAudioRecording();
                    isRecording = true;
                    state = 'recording';

                    speakButton.classList.add('recording');
                    speakButton.querySelector('.button-label').textContent = 'RECORDING';
                    speakButton.querySelector('.button-hint').textContent = 'Tap to stop';
                    captureButton.classList.add('button-disabled');
                    updateLog(3, 'State: recording');
                } catch (err) {
                    console.error('Recording error:', err);
                    speak('Recording failed');
                }
            } else {
                // Stop recording
                isRecording = false;
                state = 'busy';

                speakButton.classList.remove('recording');
                speakButton.classList.add('button-disabled');
                speakButton.querySelector('.button-label').textContent = 'SPEAK';
                speakButton.querySelector('.button-hint').textContent = 'Tap to record';
                updateLog(3, 'State: processing');

                try {
                    const audioBlob = await stopAudioRecording();
                    updateLog(2, 'Uploading audio + sensors');

                    const result = await uploadCommand(audioBlob);

                    updateLog(2, `Last upload: audio + sensors`);

                    if (result.spoken_text) {
                        speak(result.spoken_text, result.audio_base64, result.audio_content_type);
                    }
                } catch (err) {
                    console.error('Command processing error:', err);
                    updateLog(2, 'Command failed');
                    speak('Command failed. Please try again.');
                } finally {
                    resetToReady();
                }
            }
        });

        // Initialize on load
        updateLog(3, 'State: boot');
        updateLog(2, 'Tap CAPTURE to start');
    </script>
</body>
</html>
